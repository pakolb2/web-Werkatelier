<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Werkatelier{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
      <i class="bi bi-palette2 me-2"></i>Werkatelier
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'leinwandpreise' %}active{% endif %}"
             href="{{ url_for('leinwandpreise') }}">
            <i class="bi bi-rulers me-1"></i>Leinwandpreis
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'materialpreise' %}active{% endif %}"
             href="{{ url_for('materialpreise') }}">
            <i class="bi bi-basket me-1"></i>Materialpreise
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'aenderung_preise' %}active{% endif %}"
             href="{{ url_for('aenderung_preise') }}">
            <i class="bi bi-pencil-square me-1"></i>Preise anpassen
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'preisanpassung' %}active{% endif %}"
             href="{{ url_for('preisanpassung') }}">
            <i class="bi bi-graph-up me-1"></i>Analyse
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<footer class="bg-dark text-secondary text-center py-3 mt-5 small">
  Werkatelier &copy; 2025
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
