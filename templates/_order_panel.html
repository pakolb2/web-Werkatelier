<!-- ── Shared order panel ─────────────────────────────────────────────────────
     Included by leinwandpreise.html and materialpreise.html.
     order.js must be loaded before this panel is rendered.
     Click any row to open the edit modal (qty + MwSt).
─────────────────────────────────────────────────────────────────────────── -->
<section id="order-panel" class="mt-4 d-none">
  <div class="card shadow-sm border-success">
    <div class="card-header d-flex align-items-center gap-2 bg-success text-white">
      <i class="bi bi-cart3 fs-5"></i>
      <span class="fw-semibold">Bestellung</span>
      <span class="badge bg-white text-success ms-1" id="order-count">0</span>
      <div class="ms-auto d-flex gap-2">
        <a href="{{ url_for('bestellung') }}" class="btn btn-sm btn-light d-print-none">
          <i class="bi bi-box-arrow-up-right me-1"></i>Vollansicht
        </a>
        <button id="btn-print-order" class="btn btn-sm btn-light d-none d-print-none">
          <i class="bi bi-file-earmark-pdf me-1"></i>PDF
        </button>
        <button id="btn-clear-order" class="btn btn-sm btn-outline-light d-print-none">
          <i class="bi bi-trash me-1"></i>Löschen
        </button>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table table-sm align-middle mb-0">
        <thead class="table-light small">
          <tr>
            <th>Beschreibung</th>
            <th>Details</th>
            <th class="text-end">CHF</th>
            <th class="d-print-none" style="width:2rem"></th>
          </tr>
        </thead>
        <tbody id="order-tbody"></tbody>
      </table>
    </div>
    <div class="card-footer d-flex justify-content-between align-items-center">
      <span class="text-secondary small" id="order-mwst-note"></span>
      <div>
        <span class="text-secondary me-2">Total</span>
        <strong class="fs-5 font-monospace" id="order-total"></strong>
        <span class="text-secondary ms-1">CHF</span>
      </div>
    </div>
  </div>
</section>

<!-- ── Edit modal (shared, used by order.js) ────────────────────────────────── -->
<div class="modal fade" id="order-edit-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title fw-semibold"><i class="bi bi-pencil me-2"></i>Artikel anpassen</h6>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-secondary small mb-3" id="edit-item-desc"></p>
        <div class="mb-3">
          <label class="form-label small fw-semibold mb-1">Anzahl</label>
          <div class="input-group input-group-sm">
            <button class="btn btn-outline-secondary" type="button" id="edit-qty-minus">−</button>
            <input type="number" class="form-control text-center fw-bold" id="edit-qty" min="1" max="99" value="1">
            <button class="btn btn-outline-secondary" type="button" id="edit-qty-plus">+</button>
          </div>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="edit-mwst" checked>
          <label class="form-check-label small fw-semibold" for="edit-mwst">MwSt 8.1% einrechnen</label>
        </div>
      </div>
      <div class="modal-footer py-2 gap-2">
        <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Abbrechen</button>
        <button type="button" class="btn btn-sm btn-success" id="btn-save-edit">
          <i class="bi bi-check me-1"></i>Speichern
        </button>
      </div>
    </div>
  </div>
</div>
